<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body >
    <div class="container-fluid bg-color">
        <div class="row">
            <div class="col-sm-5">
                <div class="box">
                    <h1 class="text-center mb-4">Tasks 📝 </h1>
                    <div class="row">
                        <div class="col-sm-6">
                            <h6>Task Added <br><span id="count" class="fs-3">0</span></h6>
                        </div>
                        <div class="col-sm-6">
                            <h6>Task Done <br> <span id="done" class="fs-3">0</span></h6>
                        </div>
                    </div>
                    <p id="date">Date:</p>
                    <div class="input-box">
                        <input type="text" placeholder="Write your task..." id="text">
                        <button onclick="add()">Add</button>
                    </div>
                    <p class="text-white mb-0">Your recent task here...</p>
                    <!-- <button onclick="blast()">❤️ Like</button> -->
                    <ul id="tasks" class="mt-3">

                    </ul>
                </div>
            </div>

        </div>

    </div>
     <div class="fab" onclick="focusInput()">+</div>
    <script src="js/main.js"></script>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        function blast() {
            let duration = 1500;
            let end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 6,
                    angle: 60,
                    spread: 80,
                    origin: { x: 0 }
                });

                confetti({
                    particleCount: 6,
                    angle: 120,
                    spread: 80,
                    origin: { x: 1 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            })();
        }
    </script>
</body>

</html>
